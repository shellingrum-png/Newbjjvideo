name: B站巴西柔术视频自动同步
on:
  schedule:
    - cron: '0 16 * * *'  # 每天北京时间0点运行
  workflow_dispatch:  # 支持手动触发运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ 依赖安装完成"
          pip list
      
      - name: 检查环境变量
        run: |
          echo "NOTION_API_TOKEN: ${#NOTION_API_TOKEN} 位"
          echo "NOTION_DATABASE_ID: ${#NOTION_DATABASE_ID} 位"
          echo "OPENAI_API_KEY: ${#OPENAI_API_KEY} 位"
          echo "OPENAI_BASE_URL: $OPENAI_BASE_URL"
          echo "OPENAI_MODEL: $OPENAI_MODEL"
          echo "BILIBILI_SEARCH_KEYWORD: $BILIBILI_SEARCH_KEYWORD"
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          BILIBILI_SEARCH_KEYWORD: ${{ secrets.BILIBILI_SEARCH_KEYWORD || '巴西柔术' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      
      - name: 运行同步脚本
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          BILIBILI_SEARCH_KEYWORD: ${{ secrets.BILIBILI_SEARCH_KEYWORD || '巴西柔术' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python -u main.py
